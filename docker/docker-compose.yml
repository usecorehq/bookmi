services:
  # Mailhog — SMTP sink for local dev. Bookmi's EmailsModule ships with
  # localhost:1025 as the default SMTP host, so no env changes needed to
  # capture emails during the demo.
  #
  #   docker compose -f docker/docker-compose.yml up -d mailhog
  #   open http://localhost:8025   # web preview of every captured email
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bookmi_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    restart: unless-stopped

  # Redis — backing store for the BullMQ email queue (and future queues).
  # Bookmi's default env points at localhost:6379 DB 1, so no env changes
  # needed. If you'd rather run Redis natively (Homebrew, apt), skip this
  # service entirely.
  #
  #   docker compose -f docker/docker-compose.yml up -d redis
  redis:
    image: redis:7-alpine
    container_name: bookmi_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - bookmi_redis_data:/data
    restart: unless-stopped

volumes:
  bookmi_redis_data:
